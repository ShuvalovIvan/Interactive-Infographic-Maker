<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Infographic Builder</title>
<style>
  :root{--accent:#6c5ce7;--accent2:#a29bfe;--bg:#1e1e2e;--panel:#2a2a3d;--text:#e0e0e0;--border:#3a3a5c;--danger:#e74c3c;--success:#2ecc71}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .topbar h1{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
  .sep{width:1px;height:20px;background:var(--border)}
  .btn{padding:5px 10px;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
  .btn-danger{background:var(--danger);color:#fff}.btn-success{background:var(--success);color:#fff}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:#fff}
  .btn-warn{background:#f39c12;color:#fff}.btn-cyan{background:#00b894;color:#fff}
  .shape-group{display:inline-flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .shape-btn{padding:5px 9px;border:none;background:transparent;color:#888;font-size:10px;font-weight:700;cursor:pointer;border-right:1px solid var(--border)}
  .shape-btn:last-child{border-right:none}.shape-btn:hover{color:var(--text)}.shape-btn.active{background:var(--accent);color:#fff}
  .save-status{font-size:10px;color:#888;display:flex;align-items:center;gap:4px}
  .save-dot{width:6px;height:6px;border-radius:50%}.save-dot.saved{background:var(--success)}.save-dot.saving{background:#f39c12}.save-dot.unsaved{background:#888}
  .storage-badge{font-size:8px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.08);color:#666;text-transform:uppercase}
  .mode-indicator{margin-left:auto;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .mode-edit{background:rgba(108,92,231,.25);color:var(--accent2)}.mode-preview{background:rgba(46,204,113,.2);color:var(--success)}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}.sidebar.hidden{display:none}
  .sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 6px}.sidebar-hdr h2{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#888}
  .zone-actions{display:flex;gap:4px;padding:0 10px 8px;flex-wrap:wrap}.zone-actions .btn{font-size:10px;padding:3px 8px}
  .zone-list{flex:1;overflow-y:auto;padding:0 10px 10px}
  .zone-item{padding:8px 10px;margin-bottom:5px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:.15s}
  .zone-item:hover{border-color:rgba(108,92,231,.4)}.zone-item.active{border-color:var(--accent);background:rgba(108,92,231,.1)}.zone-item.multi-selected{border-color:#f39c12;background:rgba(243,156,18,.1)}
  .zi-head{display:flex;justify-content:space-between;align-items:center}.zi-title{font-size:12px;font-weight:600}.zi-info{font-size:10px;color:#888;margin-top:2px}
  .zi-color{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}.zi-color.no-color{background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 50%/8px 8px}
  .zi-actions{display:flex;gap:3px;margin-top:6px}
  .zi-btn{padding:2px 7px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:3px;cursor:pointer}.zi-btn:hover{border-color:var(--accent)}.zi-btn.del:hover{border-color:var(--danger);color:var(--danger)}
  .canvas-wrap{flex:1;position:relative;overflow:hidden;background:#111}.canvas-wrap canvas{position:absolute;top:0;left:0}
  #bgCanvas{z-index:1}#drawCanvas{z-index:2}
  .hoverbox{position:absolute;z-index:100;padding:14px 18px;border-radius:10px;max-width:320px;min-width:160px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;transform:translateY(6px);box-shadow:0 8px 30px rgba(0,0,0,.4)}.hoverbox.visible{opacity:1;transform:translateY(0)}.hoverbox .hb-title{margin-bottom:6px}.hoverbox .hb-desc{font-size:13px;line-height:1.5}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;width:530px;max-height:88vh;overflow-y:auto}
  .modal h2{font-size:15px;margin-bottom:14px}
  .field{margin-bottom:10px}.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:3px}
  .field input,.field textarea,.field select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit}
  .field textarea{resize:vertical;min-height:50px}.field input[type=color]{height:32px;padding:2px;cursor:pointer}.field select{cursor:pointer}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .color-row{display:flex;align-items:center;gap:8px}.color-row input[type=color]{width:44px;flex-shrink:0}
  .no-color-btn,.toggle-btn{padding:4px 9px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:.15s}
  .no-color-btn.active,.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:6px}
  .tab-btn{padding:4px 10px;font-size:10px;font-weight:600;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent}.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}
  .code-editor{font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;line-height:1.4;background:#16162a;color:#ccc;border:1px solid var(--border);border-radius:5px;padding:8px;min-height:55px;width:100%;resize:vertical;tab-size:2}
  .preview-pane{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px;min-height:36px;overflow:auto}
  .drop-hint{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#666;font-size:14px;gap:8px}.drop-hint svg{opacity:.3}.drop-hint span{opacity:.6}.drop-hint.hidden{display:none}
  .instructions{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,.75);padding:7px 14px;border-radius:7px;font-size:10px;color:#aaa;white-space:nowrap;backdrop-filter:blur(6px)}
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:flex;align-items:center;justify-content:center}
  .confirm-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;width:340px;text-align:center}.confirm-box p{margin-bottom:16px;font-size:13px;line-height:1.5}.confirm-box .actions{display:flex;gap:8px;justify-content:center}
  .field-hint{font-size:9px;color:#666;margin-top:2px}
  .hb-pos-row{display:flex;gap:8px;align-items:flex-end;margin-top:6px}.hb-pos-row .field{margin-bottom:0;flex:1}
  .place-btn{padding:4px 9px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);align-self:flex-end;white-space:nowrap}.place-btn:hover{border-color:var(--accent);color:#fff}
  .pulse-row{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}.pulse-row .field{margin-bottom:0}
  .pulse-canvas{width:56px;height:56px;border-radius:6px;border:1px solid var(--border)}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#666;margin:12px 0 6px;padding-top:8px;border-top:1px solid var(--border)}
  .inline-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}.inline-row .field{margin-bottom:0;flex:1}
  .pin-shapes{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .pin-shape-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
  .pin-shape-btn:hover{border-color:var(--accent)}.pin-shape-btn.active{border-color:var(--accent);background:rgba(108,92,231,.2)}
  .pin-shape-btn svg{width:20px;height:20px}
  .font-preview{margin-top:6px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:14px;color:#fff;min-height:36px}
</style>
</head>
<body>
<div class="topbar">
  <h1>Infographic Builder</h1><div class="sep"></div>
  <label class="btn btn-ghost" style="cursor:pointer">Image<input type="file" id="imgInput" accept="image/*" hidden></label>
  <div class="shape-group"><button class="shape-btn active" data-shape="polygon">Poly</button><button class="shape-btn" data-shape="rect">Rect</button><button class="shape-btn" data-shape="oval">Oval</button></div>
  <button class="btn btn-primary" id="addZoneBtn">+ Zone</button>
  <button class="btn btn-ghost" id="toggleMode">Preview</button><div class="sep"></div>
  <button class="btn btn-success" id="exportBtn">Export</button>
  <button class="btn btn-warn" id="saveFileBtn">Save</button>
  <label class="btn btn-ghost" style="cursor:pointer">Load<input type="file" id="loadFileInput" accept=".json" hidden></label>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="saveBtn" style="font-size:9px;padding:3px 8px">Autosave</button>
  <button class="btn btn-danger" id="resetBtn" style="font-size:9px;padding:3px 8px">Reset</button>
  <div class="save-status" id="saveStatus"><div class="save-dot unsaved"></div><span>Ready</span></div>
  <span class="storage-badge" id="storageBadge"></span>
  <div class="mode-indicator mode-edit" id="modeLabel">Edit</div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr"><h2>Zones</h2><span id="selCount" style="font-size:10px;color:#888"></span></div>
    <div class="zone-actions" id="zoneActions"></div>
    <div class="zone-list" id="zoneList"></div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="drop-hint" id="dropHint"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Upload or drop an image to start</span></div>
    <canvas id="bgCanvas"></canvas><canvas id="drawCanvas"></canvas>
    <div class="hoverbox" id="hoverbox"><div class="hb-title"></div><div class="hb-desc"></div></div>
    <div class="instructions" id="instructions" style="display:none"></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">Edit Zone</h2>
    <!-- TITLE -->
    <div class="field"><label>Title</label>
      <div class="tab-bar"><button class="tab-btn active" data-target="titleVisual">Visual</button><button class="tab-btn" data-target="titleCode">HTML</button><button class="tab-btn" data-target="titlePreview">Preview</button></div>
      <div id="titleVisual"><input id="mTitle" placeholder="Zone title"></div>
      <div id="titleCode" style="display:none"><textarea class="code-editor" id="mTitleHtml"></textarea></div>
      <div id="titlePreview" style="display:none"><div class="preview-pane" id="titlePreviewPane"></div></div>
    </div>
    <!-- DESC -->
    <div class="field"><label>Description</label>
      <div class="tab-bar"><button class="tab-btn active" data-target="descVisual">Visual</button><button class="tab-btn" data-target="descCode">HTML</button><button class="tab-btn" data-target="descPreview">Preview</button></div>
      <div id="descVisual"><textarea id="mDesc" placeholder="Description..."></textarea></div>
      <div id="descCode" style="display:none"><textarea class="code-editor" id="mDescHtml"></textarea></div>
      <div id="descPreview" style="display:none"><div class="preview-pane" id="descPreviewPane"></div></div>
    </div>
    <!-- ZONE COLOR -->
    <div class="field"><label>Zone Color</label>
      <div class="color-row"><input type="color" id="mColor" value="#6c5ce7"><input type="range" id="mOpacity" min="0" max="100" value="25" style="flex:1"><button class="no-color-btn" id="noColorBtn">No Color</button></div>
    </div>
    <!-- FONT -->
    <div class="section-label">Fonts</div>
    <div class="inline-row">
      <div class="field" style="flex:2"><label>Font Family</label>
        <select id="mFontFamily">
          <option value="">Default (system)</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Impact, sans-serif">Impact</option>
          <option value="__custom__">Custom / Google Font...</option>
        </select>
      </div>
      <div class="field" style="flex:1"><label>Title Size</label><input type="number" id="mFontSizeTitle" value="15" min="8" max="60"></div>
      <div class="field" style="flex:1"><label>Desc Size</label><input type="number" id="mFontSizeDesc" value="13" min="8" max="40"></div>
    </div>
    <div id="customFontRow" style="display:none">
      <div class="field"><label>Custom Font Family</label><input id="mFontCustom" placeholder="e.g. 'Poppins', sans-serif"></div>
      <div class="field"><label>Google Fonts URL (optional)</label><input id="mFontUrl" placeholder="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700"></div>
      <div class="field-hint">Paste a Google Fonts embed URL. It will be included in the export.</div>
    </div>
    <div class="font-preview" id="fontPreview">The quick brown fox jumps</div>
    <!-- PULSE -->
    <div class="section-label">Pulse Glow</div>
    <div class="field">
      <div class="pulse-row">
        <button class="toggle-btn" id="pulseToggle">Pulse</button>
        <div class="field"><label>Color</label><input type="color" id="mPulseColor" value="#ffffff"></div>
        <div class="field"><label>Speed</label><select id="mPulseSpeed" style="width:80px"><option value="4">Slow</option><option value="2.5" selected>Med</option><option value="1.5">Fast</option><option value="0.8">Rapid</option></select></div>
        <div class="field"><label>Power</label><select id="mPulseIntensity" style="width:80px"><option value="0.2">Subtle</option><option value="0.4" selected>Med</option><option value="0.65">Strong</option><option value="0.9">Bright</option></select></div>
        <div class="field"><label>Spread</label><select id="mPulseSpread" style="width:80px"><option value="0.4">Tight</option><option value="0.65" selected>Normal</option><option value="0.85">Wide</option><option value="1.2">Bloom</option></select></div>
        <div class="field"><label>Bounds</label><select id="mPulseSpill" style="width:80px"><option value="contained">Contained</option><option value="spill">Spill</option></select></div>
        <canvas class="pulse-canvas" id="pulsePreview" width="56" height="56"></canvas>
      </div>
    </div>
    <!-- PIN -->
    <div class="section-label">Pin Marker</div>
    <div class="field">
      <div class="inline-row">
        <button class="toggle-btn" id="pinToggle">Pin</button>
        <div class="field"><label>Color</label><input type="color" id="mPinColor" value="#e74c3c"></div>
        <div class="field"><label>Size</label><input type="range" id="mPinSize" min="12" max="60" value="28" style="width:80px"></div>
        <div class="field"><label>Label</label><input id="mPinLabel" placeholder="A" style="width:50px;text-align:center"></div>
      </div>
      <div class="field" style="margin-top:6px"><label>Shape</label>
        <div class="pin-shapes" id="pinShapes">
          <button class="pin-shape-btn active" data-pin="mappin"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg></button>
          <button class="pin-shape-btn" data-pin="dot"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg></button>
          <button class="pin-shape-btn" data-pin="star"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01z"/></svg></button>
          <button class="pin-shape-btn" data-pin="diamond"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12l10 10 10-10z"/></svg></button>
          <button class="pin-shape-btn" data-pin="ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="7"/></svg></button>
          <button class="pin-shape-btn" data-pin="crosshair"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="6"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg></button>
          <button class="pin-shape-btn" data-pin="custom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><text x="12" y="16" text-anchor="middle" font-size="10" fill="currentColor" stroke="none">IMG</text></svg></button>
        </div>
      </div>
      <div id="customPinRow" style="display:none;margin-top:6px">
        <label class="btn btn-ghost" style="cursor:pointer;font-size:10px">Upload Pin Image<input type="file" id="pinImgInput" accept="image/*" hidden></label>
        <span id="pinImgName" style="font-size:10px;color:#888;margin-left:6px"></span>
      </div>
      <div class="field-hint">Pin appears at zone center. Choose a shape or upload a custom image.</div>
    </div>
    <!-- HOVERBOX -->
    <div class="section-label">Hoverbox Style</div>
    <div style="display:flex;gap:8px">
      <div class="field" style="flex:1"><label>BG</label><input type="color" id="mHbBg" value="#2a2a3d"></div>
      <div class="field" style="flex:1"><label>Text</label><input type="color" id="mHbText" value="#ffffff"></div>
      <div class="field" style="flex:1"><label>Radius</label><input type="number" id="mHbRadius" value="10" min="0" max="40"></div>
    </div>
    <div class="field"><label>Position</label>
      <select id="mHbMode"><option value="follow">Follow cursor</option><option value="fixed">Fixed</option></select>
      <div class="hb-pos-row" id="fixedPosRow" style="display:none">
        <div class="field"><label>X</label><input type="number" id="mHbX" value="0"></div>
        <div class="field"><label>Y</label><input type="number" id="mHbY" value="0"></div>
        <button class="place-btn" id="placeBtn">Pick</button>
      </div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSave">Save</button></div>
  </div>
</div>
<script>
/* === STORAGE === */
const Storage=(function(){let bk=null,db=null;const DN='InfographicBuilder',ST='kv';function hC(){try{return typeof window.storage==='object'&&typeof window.storage.get==='function'}catch(e){return false}}function oI(){return new Promise(r=>{try{const q=indexedDB.open(DN,1);q.onupgradeneeded=e=>e.target.result.createObjectStore(ST);q.onsuccess=e=>{db=e.target.result;r(true)};q.onerror=()=>r(false)}catch(e){r(false)}})}async function init(){if(hC())bk='claude';else if(await oI())bk='idb';else bk='ls';return bk}function iG(k){return new Promise((r,j)=>{const t=db.transaction(ST,'readonly'),q=t.objectStore(ST).get(k);q.onsuccess=()=>r(q.result!==undefined?{value:q.result}:null);q.onerror=()=>j(q.error)})}function iS(k,v){return new Promise((r,j)=>{const t=db.transaction(ST,'readwrite');t.objectStore(ST).put(v,k);t.oncomplete=()=>r({key:k});t.onerror=()=>j(t.error)})}function iD(k){return new Promise((r,j)=>{const t=db.transaction(ST,'readwrite');t.objectStore(ST).delete(k);t.oncomplete=()=>r(true);t.onerror=()=>j(t.error)})}return{init,getBackend(){return bk},async get(k){if(bk==='claude')return await window.storage.get(k);if(bk==='idb')return await iG(k);const v=localStorage.getItem(k);return v!==null?{value:v}:null},async set(k,v){if(bk==='claude')return await window.storage.set(k,v);if(bk==='idb')return await iS(k,v);localStorage.setItem(k,v);return{key:k}},async del(k){if(bk==='claude')return await window.storage.delete(k);if(bk==='idb')return await iD(k);localStorage.removeItem(k);return true}}})();

const DRAG_BUF=14,EDGE_BUF=10,AUTOSAVE_MS=1500,OVAL_PTS=32;
const S={img:null,imgW:0,imgH:0,imgSrc:null,zones:[],mode:'edit',shapeTool:'polygon',drawing:false,currentPts:[],shapeStart:null,shapeEnd:null,shapeDragging:false,selectedZones:new Set(),hoveredZone:null,nextId:1,dragging:false,dragZoneId:null,dragPartIdx:-1,dragPtIdx:-1,dragStarted:false,moveDrag:false,moveZoneIds:[],moveStartImg:null,moveLastImg:null,moveMoved:false,placing:false,placingZoneId:null};
const $=s=>document.querySelector(s),bgC=$('#bgCanvas'),drawC=$('#drawCanvas'),bgX=bgC.getContext('2d'),ctx=drawC.getContext('2d');
let animTime=0,animRunning=false;

// Pin images cache
const pinImages={};

// --- UI wiring ---
document.querySelectorAll('.shape-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.shape-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.shapeTool=b.dataset.shape;if(S.drawing)cancelDraw();}));

function updatePulsePreview(){const cv=$('#pulsePreview'),cx=cv.getContext('2d');cancelAnimationFrame(ppAnim);if(!pulseActive){cx.clearRect(0,0,56,56);return;}const col=$('#mPulseColor').value,spd=parseFloat($('#mPulseSpeed').value),inten=parseFloat($('#mPulseIntensity').value),spread=parseFloat($('#mPulseSpread').value),spill=$('#mPulseSpill').value,rgb=hexToRgb(col);function draw(t){cx.clearRect(0,0,56,56);const ph=(Math.sin(t/(spd*500)*Math.PI*2)+1)/2,al=ph*inten,r=(10+ph*spread*16)*(spill==='spill'?1.3:1);if(spill!=='spill'){cx.save();cx.beginPath();cx.moveTo(28,4);cx.lineTo(52,28);cx.lineTo(28,52);cx.lineTo(4,28);cx.closePath();cx.clip();}const g=cx.createRadialGradient(28,28,0,28,28,r);g.addColorStop(0,`rgba(${rgb},${al})`);g.addColorStop(0.4,`rgba(${rgb},${al*0.6})`);g.addColorStop(1,`rgba(${rgb},0)`);cx.fillStyle=g;cx.fillRect(0,0,56,56);const cg=cx.createRadialGradient(28,28,0,28,28,3+ph*3);cg.addColorStop(0,`rgba(255,255,255,${al*0.9})`);cg.addColorStop(1,`rgba(255,255,255,0)`);cx.fillStyle=cg;cx.fillRect(0,0,56,56);if(spill!=='spill')cx.restore();cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=1;cx.beginPath();cx.moveTo(28,4);cx.lineTo(52,28);cx.lineTo(28,52);cx.lineTo(4,28);cx.closePath();cx.stroke();ppAnim=requestAnimationFrame(()=>draw(performance.now()));}draw(performance.now());}

/* === Helpers === */
function ensP(z){if(!z.parts){z.parts=z.points?[z.points]:[];delete z.points;}
  const d={hbMode:'follow',hbX:0,hbY:0,pulse:false,pulseColor:'#ffffff',pulseSpeed:2.5,pulseIntensity:0.4,pulseSpread:0.65,pulseSpill:'contained',pin:false,pinShape:'mappin',pinColor:'#e74c3c',pinSize:28,pinLabel:'',pinImg:'',fontFamily:'',fontCustom:'',fontUrl:'',fontSizeTitle:15,fontSizeDesc:13};
  for(const k in d) if(z[k]===undefined) z[k]=d[k];
  return z;}
function zP(z){ensP(z);return z.parts;}
function hexA(a){const v=Math.round(Math.max(0,Math.min(1,a))*255).toString(16);return v.length<2?'0'+v:v;}
function hexToRgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function totPts(z){return zP(z).reduce((s,p)=>s+p.length,0);}
function cloneZone(z){return JSON.parse(JSON.stringify(z));}
function partCentroid(pts){if(!pts.length)return[0,0];let sx=0,sy=0;pts.forEach(p=>{sx+=p[0];sy+=p[1]});return[sx/pts.length,sy/pts.length];}
function partRadius(pts,cx,cy){let mx=0;pts.forEach(p=>{const d=Math.hypot(p[0]-cx,p[1]-cy);if(d>mx)mx=d;});return mx;}
function zoneCentroid(z){return partCentroid(zP(z).flat());}

function getScale(){if(!S.img)return{s:1,ox:0,oy:0};const w=drawC.width,h=drawC.height,sc=Math.min(w/S.imgW,h/S.imgH);return{s:sc,ox:(w-S.imgW*sc)/2,oy:(h-S.imgH*sc)/2};}
function toC(px,py){const{s,ox,oy}=getScale();return[px*s+ox,py*s+oy];}
function toI(cx,cy){const{s,ox,oy}=getScale();return[(cx-ox)/s,(cy-oy)/s];}
function findPt(cx,cy){let best=null,bd=1e9;const pri=[...S.selectedZones];const order=[...S.zones.filter(z=>pri.includes(z.id)),...S.zones.filter(z=>!pri.includes(z.id))];for(const z of order)for(let pi=0;pi<zP(z).length;pi++)for(let i=0;i<z.parts[pi].length;i++){const[px,py]=toC(...z.parts[pi][i]);const d=Math.hypot(cx-px,cy-py);if(d<DRAG_BUF&&d<bd){bd=d;best={zid:z.id,pi,i};}}return best;}
function findEdge(cx,cy){if(S.selectedZones.size!==1)return null;const z=S.zones.find(zz=>zz.id===[...S.selectedZones][0]);if(!z)return null;let best=null,bd=1e9;for(let pi=0;pi<zP(z).length;pi++){const pts=z.parts[pi];for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;const[ax,ay]=toC(...pts[i]),[bx,by]=toC(...pts[j]);const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(!l2)continue;let t=((cx-ax)*dx+(cy-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));const px2=ax+t*dx,py2=ay+t*dy,d=Math.hypot(cx-px2,cy-py2);if(d<EDGE_BUF&&d<bd){bd=d;const ip=toI(px2,py2);best={pi,ei:i,pt:[Math.round(ip[0]),Math.round(ip[1])]};}}}return best;}
function ptInPoly(x,y,pts){let ins=false;for(let i=0,j=pts.length-1;i<pts.length;j=i++){const[xi,yi]=pts[i],[xj,yj]=pts[j];if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))ins=!ins;}return ins;}
function ptInZone(x,y,z){return zP(z).some(p=>ptInPoly(x,y,p));}
function hitZone(cx,cy){const[ix,iy]=toI(cx,cy);return[...S.zones].reverse().find(z=>ptInZone(ix,iy,z))||null;}
function makeRect(a,b){const x1=Math.min(a[0],b[0]),y1=Math.min(a[1],b[1]),x2=Math.max(a[0],b[0]),y2=Math.max(a[1],b[1]);return[[x1,y1],[x2,y1],[x2,y2],[x1,y2]].map(p=>[Math.round(p[0]),Math.round(p[1])]);}
function makeOval(a,b){const cx2=(a[0]+b[0])/2,cy2=(a[1]+b[1])/2,rx=Math.abs(b[0]-a[0])/2,ry=Math.abs(b[1]-a[1])/2;const pts=[];for(let i=0;i<OVAL_PTS;i++){const ang=2*Math.PI*i/OVAL_PTS;pts.push([Math.round(cx2+rx*Math.cos(ang)),Math.round(cy2+ry*Math.sin(ang))]);}return pts;}
function moveZonesBy(ids,dx,dy){ids.forEach(id=>{const z=S.zones.find(zz=>zz.id===id);if(!z)return;zP(z).forEach(pts=>{for(let i=0;i<pts.length;i++)pts[i]=[Math.round(pts[i][0]+dx),Math.round(pts[i][1]+dy)];});if(z.hbMode==='fixed'){z.hbX=Math.round(z.hbX+dx);z.hbY=Math.round(z.hbY+dy);}});}
function duplicateSelected(){const ids=[...S.selectedZones];if(!ids.length)return;const nids=[];ids.forEach(id=>{const z=S.zones.find(zz=>zz.id===id);if(!z)return;const nz=cloneZone(z);nz.id=S.nextId++;nz.title=z.title+' copy';zP(nz).forEach(pts=>{for(let i=0;i<pts.length;i++)pts[i]=[pts[i][0]+20,pts[i][1]+20];});if(nz.hbMode==='fixed'){nz.hbX+=20;nz.hbY+=20;}S.zones.push(nz);nids.push(nz.id);});S.selectedZones.clear();nids.forEach(id=>S.selectedZones.add(id));renderList();render();markDirty();checkAnim();}

/* === Draw Pin on Canvas === */
function drawPin(cx2,cy2,z,sc){
  if(!z.pin)return;
  const sz=z.pinSize*sc;const col=z.pinColor;
  ctx.save();
  if(z.pinShape==='custom'&&z.pinImg&&pinImages[z.pinImg]){
    const img=pinImages[z.pinImg];
    ctx.drawImage(img,cx2-sz/2,cy2-sz/2,sz,sz);
  } else {
    ctx.fillStyle=col;ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(1,sc*1.5);
    switch(z.pinShape){
      case 'mappin':
        ctx.beginPath();const pr=sz*0.38,ph=sz;ctx.moveTo(cx2,cy2+ph*0.3);
        ctx.bezierCurveTo(cx2-pr*0.3,cy2-ph*0.1,cx2-pr,cy2-ph*0.35,cx2-pr,cy2-ph*0.35);
        ctx.arc(cx2,cy2-ph*0.35,pr,Math.PI,0,false);
        ctx.bezierCurveTo(cx2+pr,cy2-ph*0.35,cx2+pr*0.3,cy2-ph*0.1,cx2,cy2+ph*0.3);
        ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.arc(cx2,cy2-ph*0.35,pr*0.4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
        break;
      case 'dot':
        ctx.beginPath();ctx.arc(cx2,cy2,sz/2,0,Math.PI*2);ctx.fill();ctx.stroke();break;
      case 'star':
        ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*Math.PI*2/5;ctx.lineTo(cx2+Math.cos(a)*sz/2,cy2-Math.sin(a)*sz/2);const a2=a+Math.PI/5;ctx.lineTo(cx2+Math.cos(a2)*sz/4.5,cy2-Math.sin(a2)*sz/4.5);}ctx.closePath();ctx.fill();ctx.stroke();break;
      case 'diamond':
        ctx.beginPath();const hs=sz/2;ctx.moveTo(cx2,cy2-hs);ctx.lineTo(cx2+hs*0.65,cy2);ctx.lineTo(cx2,cy2+hs);ctx.lineTo(cx2-hs*0.65,cy2);ctx.closePath();ctx.fill();ctx.stroke();break;
      case 'ring':
        ctx.beginPath();ctx.arc(cx2,cy2,sz/2,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,sc*3);ctx.stroke();ctx.beginPath();ctx.arc(cx2,cy2,sz/6,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();break;
      case 'crosshair':
        ctx.beginPath();ctx.arc(cx2,cy2,sz/2.5,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=Math.max(1.5,sc*2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx2,cy2-sz/2);ctx.lineTo(cx2,cy2-sz/3);ctx.moveTo(cx2,cy2+sz/3);ctx.lineTo(cx2,cy2+sz/2);ctx.moveTo(cx2-sz/2,cy2);ctx.lineTo(cx2-sz/3,cy2);ctx.moveTo(cx2+sz/3,cy2);ctx.lineTo(cx2+sz/2,cy2);ctx.stroke();break;
    }
  }
  // label
  if(z.pinLabel){
    const fs=Math.max(8,sz*0.4);
    ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;
    const ly=z.pinShape==='mappin'?cy2-sz*0.35:cy2;
    ctx.strokeText(z.pinLabel,cx2,ly);ctx.fillText(z.pinLabel,cx2,ly);
  }
  ctx.restore();
}

/* === RENDER === */
function render(){
  const w=bgC.width,h=bgC.height;bgX.clearRect(0,0,w,h);ctx.clearRect(0,0,w,h);
  if(S.img){const{s,ox,oy}=getScale();bgX.drawImage(S.img,ox,oy,S.imgW*s,S.imgH*s);}
  const t=animTime||0,{s:sc}=getScale();
  S.zones.forEach(z=>{
    const sel=S.selectedZones.has(z.id),hov=S.mode==='preview'&&S.hoveredZone===z.id,nc=z.noColor;
    const isPulsing=z.pulse&&!hov;let phase=0;
    if(isPulsing){const spd=z.pulseSpeed||2.5;phase=(Math.sin(t/(spd*500)*Math.PI*2)+1)/2;}
    zP(z).forEach(pts=>{
      if(pts.length<2)return;
      function tracePath(){ctx.beginPath();ctx.moveTo(...toC(...pts[0]));for(let i=1;i<pts.length;i++)ctx.lineTo(...toC(...pts[i]));ctx.closePath();}
      tracePath();
      if(nc&&!hov&&!isPulsing){if(S.mode==='edit'){ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.25)';ctx.lineWidth=sel?2:1;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);}}
      else if(!isPulsing||hov){const op=(z.opacity||25)/100;ctx.fillStyle=z.color+hexA(hov?Math.min(op+.25,1):op);ctx.fill();ctx.strokeStyle=sel?'#fff':z.color;ctx.lineWidth=sel?2.5:1.5;ctx.stroke();}
      else{const op=(z.opacity||25)/100;ctx.fillStyle=z.color+hexA(op*0.5);ctx.fill();ctx.strokeStyle=sel?'#fff':z.color;ctx.lineWidth=sel?2:1;ctx.stroke();}
      if(isPulsing){const cent=partCentroid(pts),[ccx,ccy]=toC(cent[0],cent[1]);const imgR=partRadius(pts,cent[0],cent[1]),canvasR=imgR*sc;const spread=z.pulseSpread||0.65,inten=z.pulseIntensity||0.4,isSpill=(z.pulseSpill||'contained')==='spill';const alpha=phase*inten,glowR=canvasR*spread*(0.6+phase*0.4)*(isSpill?1.5:1);const rgb=hexToRgb(z.pulseColor);
        ctx.save();if(!isSpill){tracePath();ctx.clip();}
        const g=ctx.createRadialGradient(ccx,ccy,0,ccx,ccy,glowR);g.addColorStop(0,`rgba(${rgb},${alpha})`);g.addColorStop(0.3,`rgba(${rgb},${alpha*0.7})`);g.addColorStop(0.7,`rgba(${rgb},${alpha*0.25})`);g.addColorStop(1,`rgba(${rgb},0)`);ctx.fillStyle=g;ctx.fillRect(ccx-glowR,ccy-glowR,glowR*2,glowR*2);
        const coreR=6+phase*8;const cg=ctx.createRadialGradient(ccx,ccy,0,ccx,ccy,coreR);cg.addColorStop(0,`rgba(255,255,255,${alpha*0.95})`);cg.addColorStop(0.3,`rgba(${rgb},${alpha*0.7})`);cg.addColorStop(1,`rgba(${rgb},0)`);ctx.fillStyle=cg;ctx.fillRect(ccx-coreR,ccy-coreR,coreR*2,coreR*2);
        ctx.restore();tracePath();ctx.save();ctx.shadowColor=`rgba(${rgb},${alpha*0.8})`;ctx.shadowBlur=isSpill?18+phase*25:10+phase*15;ctx.strokeStyle=`rgba(${rgb},${alpha*(isSpill?0.6:0.4)})`;ctx.lineWidth=isSpill?2.5:1.5;ctx.stroke();ctx.restore();}
      if(S.mode==='edit'){pts.forEach((p,i)=>{const[cx2,cy2]=toC(...p);const isD=S.dragging&&S.dragZoneId===z.id&&S.dragPtIdx===i;const rad=isD?7:(sel?5:3);if(sel){ctx.beginPath();ctx.arc(cx2,cy2,DRAG_BUF,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fill();}ctx.beginPath();ctx.arc(cx2,cy2,rad,0,Math.PI*2);ctx.fillStyle=isD?'#fff':(nc?'#aaa':z.color);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();});}
    });
    // Pin

/* === EXPORT === */
$('#exportBtn').addEventListener('click',()=>{
  if(!S.img||!S.zones.length)return alert('Need image + zones.');
  const zones=S.zones.map(z=>({...z,parts:zP(z)}));
  // Collect unique font URLs
  const fontUrls=new Set();zones.forEach(z=>{if(z.fontUrl)fontUrls.add(z.fontUrl);});
  let fontLinks='';fontUrls.forEach(u=>{fontLinks+=`<link rel="stylesheet" href="${u}">\n`;});

  // Pulse defs
  let defs='';let pidx=0;
  zones.forEach((z,i)=>{if(!z.pulse)return;z._pid='pg'+pidx++;
    z.parts.forEach((pts,pi)=>{const c=partCentroid(pts),r=partRadius(pts,c[0],c[1]);const gid=z._pid+'_'+pi;const isSpill=z.pulseSpill==='spill';const glowR=r*z.pulseSpread*(isSpill?1.5:1);
      defs+=`<radialGradient id="${gid}" cx="${c[0]}" cy="${c[1]}" r="${glowR}" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="white" stop-opacity="1"/><stop offset="20%" stop-color="${z.pulseColor}" stop-opacity="0.8"/><stop offset="60%" stop-color="${z.pulseColor}" stop-opacity="0.3"/><stop offset="100%" stop-color="${z.pulseColor}" stop-opacity="0"/></radialGradient>\n`;
      if(!isSpill)defs+=`<clipPath id="cp${gid}"><polygon points="${pts.map(p=>p.join(',')).join(' ')}"/></clipPath>\n`;});});

  // Pin SVG builders
  function pinSVG(z,cx2,cy2){
    if(!z.pin)return '';const sz=z.pinSize,col=z.pinColor,hs=sz/2;let svg='';
    if(z.pinShape==='custom'&&z.pinImg){svg=`<image href="${z.pinImg}" x="${cx2-hs}" y="${cy2-hs}" width="${sz}" height="${sz}"/>`;}
    else if(z.pinShape==='dot'){svg=`<circle cx="${cx2}" cy="${cy2}" r="${hs}" fill="${col}" stroke="white" stroke-width="1.5"/>`;}
    else if(z.pinShape==='star'){let pts='';for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;pts+=`${cx2+Math.cos(a)*hs},${cy2+Math.sin(a)*hs} `;const a2=a+Math.PI/5;pts+=`${cx2+Math.cos(a2)*hs/2.2},${cy2+Math.sin(a2)*hs/2.2} `;}svg=`<polygon points="${pts.trim()}" fill="${col}" stroke="white" stroke-width="1.5"/>`;}
    else if(z.pinShape==='diamond'){svg=`<polygon points="${cx2},${cy2-hs} ${cx2+hs*0.65},${cy2} ${cx2},${cy2+hs} ${cx2-hs*0.65},${cy2}" fill="${col}" stroke="white" stroke-width="1.5"/>`;}
    else if(z.pinShape==='ring'){svg=`<circle cx="${cx2}" cy="${cy2}" r="${hs}" fill="none" stroke="${col}" stroke-width="3"/><circle cx="${cx2}" cy="${cy2}" r="${sz/6}" fill="${col}"/>`;}
    else if(z.pinShape==='crosshair'){svg=`<circle cx="${cx2}" cy="${cy2}" r="${sz/2.5}" fill="none" stroke="${col}" stroke-width="2"/><line x1="${cx2}" y1="${cy2-hs}" x2="${cx2}" y2="${cy2-sz/3}" stroke="${col}" stroke-width="2"/><line x1="${cx2}" y1="${cy2+sz/3}" x2="${cx2}" y2="${cy2+hs}" stroke="${col}" stroke-width="2"/><line x1="${cx2-hs}" y1="${cy2}" x2="${cx2-sz/3}" y2="${cy2}" stroke="${col}" stroke-width="2"/><line x1="${cx2+sz/3}" y1="${cy2}" x2="${cx2+hs}" y2="${cy2}" stroke="${col}" stroke-width="2"/>`;}
    else{// mappin
      const pr=sz*0.38,ph=sz;svg=`<path d="M${cx2},${cy2+ph*0.3} C${cx2-pr*0.3},${cy2-ph*0.1} ${cx2-pr},${cy2-ph*0.35} ${cx2-pr},${cy2-ph*0.35} A${pr},${pr} 0 1,1 ${cx2+pr},${cy2-ph*0.35} C${cx2+pr},${cy2-ph*0.35} ${cx2+pr*0.3},${cy2-ph*0.1} ${cx2},${cy2+ph*0.3}Z" fill="${col}" stroke="white" stroke-width="1.5"/><circle cx="${cx2}" cy="${cy2-ph*0.35}" r="${pr*0.4}" fill="white"/>`;}
    if(z.pinLabel){const fs=Math.max(8,sz*0.35);const ly=z.pinShape==='mappin'?cy2-sz*0.35:cy2;svg+=`<text x="${cx2}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="${fs}" font-weight="bold" fill="white" stroke="rgba(0,0,0,0.5)" stroke-width="1.5">${esc(z.pinLabel)}</text>`;}
    return svg;
  }

  let polys='',pins='';
  zones.forEach((z,i)=>{const hf=z.noColor?'transparent':z.color+hexA((z.opacity||25)/100);const cls=z.noColor?'zone nh':'zone';
    z.parts.forEach((pts,pi)=>{const pstr=pts.map(p=>p.join(',')).join(' ');polys+=`<polygon class="${cls}" data-i="${i}" points="${pstr}" style="--hc:${hf}"/>\n`;
      if(z.pulse){const gid=z._pid+'_'+pi;const isSpill=z.pulseSpill==='spill';const c=partCentroid(pts),r=partRadius(pts,c[0],c[1]),glowR=r*z.pulseSpread*(isSpill?1.5:1);
        if(isSpill)polys+=`<circle class="pulse-zone" data-i="${i}" cx="${c[0]}" cy="${c[1]}" r="${glowR}" fill="url(#${gid})" style="--ps:${z.pulseSpeed}s;--pi:${z.pulseIntensity}"/>\n`;
        else polys+=`<rect class="pulse-zone" data-i="${i}" x="${c[0]-glowR}" y="${c[1]-glowR}" width="${glowR*2}" height="${glowR*2}" fill="url(#${gid})" clip-path="url(#cp${gid})" style="--ps:${z.pulseSpeed}s;--pi:${z.pulseIntensity}"/>\n`;}});
    if(z.pin){const c=partCentroid(z.parts.flat());pins+=pinSVG(z,Math.round(c[0]),Math.round(c[1]));}
  });

  const html=`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interactive Infographic</title>
${fontLinks}<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{position:relative;display:inline-block;line-height:0}.wrap img{max-width:100vw;max-height:100vh}
svg{position:absolute;top:0;left:0;width:100%;height:100%}
.zone{cursor:pointer;fill:transparent;stroke:transparent;stroke-width:0;transition:fill .25s,stroke .25s}
.zone:hover{fill:var(--hc);stroke:var(--hc);stroke-width:1.5}.zone.nh:hover{fill:transparent;stroke:transparent}
.pulse-zone{pointer-events:none;opacity:0;animation:pulseGlow var(--ps,2.5s) ease-in-out infinite}
@keyframes pulseGlow{0%,100%{opacity:0}50%{opacity:var(--pi,0.4)}}
.hb{position:absolute;padding:14px 18px;max-width:320px;min-width:160px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;transform:translateY(6px);box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:10}.hb.show{opacity:1;transform:translateY(0)}
</style></head><body>
<div class="wrap" id="wrap"><img src="${S.imgSrc}" id="bgImg">
<svg viewBox="0 0 ${S.imgW} ${S.imgH}" preserveAspectRatio="xMidYMid meet"><defs>${defs}</defs>${polys}${pins}</svg>
<div class="hb" id="hb"><div class="hbt"></div><div class="hbd"></div></div></div>
<script>
const Z=${JSON.stringify(zones.map(z=>({title:z.title,desc:z.desc,titleHtml:z.titleHtml||'',descHtml:z.descHtml||'',hbBg:z.hbBg,hbText:z.hbText,hbRadius:z.hbRadius,hbMode:z.hbMode,hbX:z.hbX,hbY:z.hbY,pulse:z.pulse,fontFamily:z.fontFamily==='__custom__'?z.fontCustom:z.fontFamily,fontSizeTitle:z.fontSizeTitle,fontSizeDesc:z.fontSizeDesc})))};
const hb=document.getElementById('hb'),wrap=document.getElementById('wrap');
function e(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function imgToWrap(ix,iy){const img=document.getElementById('bgImg'),r=img.getBoundingClientRect(),wr=wrap.getBoundingClientRect(),s=img.naturalWidth?r.width/img.naturalWidth:1;return{x:ix*s+(r.left-wr.left),y:iy*s+(r.top-wr.top)};}
document.querySelectorAll('.zone').forEach(el=>{
el.addEventListener('mouseenter',ev=>{const z=Z[el.dataset.i];const ff=z.fontFamily;const fst='margin:0;font-size:'+(z.fontSizeTitle||15)+'px'+(ff?';font-family:'+ff:'');const fsd='margin:0;font-size:'+(z.fontSizeDesc||13)+'px;line-height:1.5'+(ff?';font-family:'+ff:'');
hb.querySelector('.hbt').innerHTML=z.titleHtml&&z.titleHtml.trim()?z.titleHtml:'<h3 style="'+fst+'">'+e(z.title)+'</h3>';
hb.querySelector('.hbd').innerHTML=z.descHtml&&z.descHtml.trim()?z.descHtml:'<p style="'+fsd+'">'+e(z.desc)+'</p>';
hb.style.background=z.hbBg;hb.style.color=z.hbText;hb.style.borderRadius=z.hbRadius+'px';
if(z.hbMode==='fixed'){const p=imgToWrap(z.hbX,z.hbY);hb.style.left=p.x+'px';hb.style.top=p.y+'px';}
hb.classList.add('show');document.querySelectorAll('.pulse-zone[data-i="'+el.dataset.i+'"]').forEach(p=>{p.style.animationPlayState='paused';p.style.opacity='0';});});
el.addEventListener('mousemove',ev=>{const z=Z[el.dataset.i];if(z.hbMode==='fixed')return;const r=wrap.getBoundingClientRect();let l=ev.clientX-r.left+16,t=ev.clientY-r.top+16;if(l+320>r.width)l=ev.clientX-r.left-280;if(t+150>r.height)t=ev.clientY-r.top-120;hb.style.left=l+'px';hb.style.top=t+'px'});
el.addEventListener('mouseleave',()=>{hb.classList.remove('show');document.querySelectorAll('.pulse-zone[data-i="'+el.dataset.i+'"]').forEach(p=>{p.style.animationPlayState='';p.style.opacity='';});});});
<\/script></body></html>`;
  const b=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='infographic.html';a.click();
});
