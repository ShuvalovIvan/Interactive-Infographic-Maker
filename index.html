<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Infographic Builder</title>
<style>
  :root { --accent:#6c5ce7; --accent2:#a29bfe; --bg:#1e1e2e; --panel:#2a2a3d; --text:#e0e0e0; --border:#3a3a5c; --danger:#e74c3c; --success:#2ecc71; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  .topbar { display:flex; align-items:center; gap:6px; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .topbar h1 { font-size:14px; font-weight:600; color:#fff; white-space:nowrap; }
  .sep { width:1px; height:20px; background:var(--border); }
  .btn { padding:5px 10px; border:none; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--accent); color:#fff; }
  .btn-warn { background:#f39c12; color:#fff; }
  .btn-cyan { background:#00b894; color:#fff; }
  .shape-group { display:inline-flex; border:1px solid var(--border); border-radius:5px; overflow:hidden; }
  .shape-btn { padding:5px 9px; border:none; background:transparent; color:#888; font-size:10px; font-weight:700; cursor:pointer; transition:.15s; border-right:1px solid var(--border); }
  .shape-btn:last-child { border-right:none; }
  .shape-btn:hover { color:var(--text); }
  .shape-btn.active { background:var(--accent); color:#fff; }
  .save-status { font-size:10px; color:#888; display:flex; align-items:center; gap:4px; }
  .save-dot { width:6px; height:6px; border-radius:50%; }
  .save-dot.saved { background:var(--success); }
  .save-dot.saving { background:#f39c12; }
  .save-dot.unsaved { background:#888; }
  .mode-indicator { margin-left:auto; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .mode-edit { background:rgba(108,92,231,.25); color:var(--accent2); }
  .mode-preview { background:rgba(46,204,113,.2); color:var(--success); }
  .main { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:270px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
  .sidebar.hidden { display:none; }
  .sidebar-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 12px 6px; }
  .sidebar-hdr h2 { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:#888; }
  .zone-actions { display:flex; gap:4px; padding:0 10px 8px; flex-wrap:wrap; }
  .zone-actions .btn { font-size:10px; padding:3px 8px; }
  .zone-list { flex:1; overflow-y:auto; padding:0 10px 10px; }
  .zone-item { padding:8px 10px; margin-bottom:5px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:7px; cursor:pointer; transition:.15s; }
  .zone-item:hover { border-color:rgba(108,92,231,.4); }
  .zone-item.active { border-color:var(--accent); background:rgba(108,92,231,.1); }
  .zone-item.multi-selected { border-color:#f39c12; background:rgba(243,156,18,.1); }
  .zi-head { display:flex; justify-content:space-between; align-items:center; }
  .zi-title { font-size:12px; font-weight:600; }
  .zi-info { font-size:10px; color:#888; margin-top:2px; }
  .zi-color { width:12px; height:12px; border-radius:50%; border:2px solid rgba(255,255,255,.2); }
  .zi-color.no-color { background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 50%/8px 8px; }
  .zi-actions { display:flex; gap:3px; margin-top:6px; }
  .zi-btn { padding:2px 7px; font-size:10px; border:1px solid var(--border); background:transparent; color:var(--text); border-radius:3px; cursor:pointer; }
  .zi-btn:hover { border-color:var(--accent); }
  .zi-btn.del:hover { border-color:var(--danger); color:var(--danger); }
  .canvas-wrap { flex:1; position:relative; overflow:hidden; background:#111; }
  .canvas-wrap canvas { position:absolute; top:0; left:0; }
  #bgCanvas { z-index:1; }
  #drawCanvas { z-index:2; }
  .hoverbox { position:absolute; z-index:100; padding:14px 18px; border-radius:10px; max-width:320px; min-width:160px; pointer-events:none; opacity:0; transition:opacity .2s,transform .2s; transform:translateY(6px); box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .hoverbox.visible { opacity:1; transform:translateY(0); }
  .hoverbox .hb-title { margin-bottom:6px; }
  .hoverbox .hb-desc { font-size:13px; line-height:1.5; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:22px; width:510px; max-height:85vh; overflow-y:auto; }
  .modal h2 { font-size:15px; margin-bottom:14px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#888; margin-bottom:4px; }
  .field input,.field textarea,.field select { width:100%; padding:7px 9px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:12px; font-family:inherit; }
  .field textarea { resize:vertical; min-height:55px; }
  .field input[type=color] { height:34px; padding:2px; cursor:pointer; }
  .field select { cursor:pointer; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
  .color-row { display:flex; align-items:center; gap:8px; }
  .color-row input[type=color] { width:48px; flex-shrink:0; }
  .no-color-btn { padding:4px 9px; font-size:10px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text); transition:.15s; }
  .no-color-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:6px; }
  .tab-btn { padding:5px 12px; font-size:10px; font-weight:600; border:none; background:transparent; color:#888; cursor:pointer; border-bottom:2px solid transparent; }
  .tab-btn.active { color:var(--accent2); border-bottom-color:var(--accent); }
  .code-editor { font-family:'Cascadia Code','Fira Code',monospace; font-size:11px; line-height:1.4; background:#16162a; color:#ccc; border:1px solid var(--border); border-radius:5px; padding:8px; min-height:60px; width:100%; resize:vertical; tab-size:2; }
  .preview-pane { background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:8px; min-height:40px; overflow:auto; }
  .drop-hint { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#666; font-size:14px; gap:8px; }
  .drop-hint svg { opacity:.3; }
  .drop-hint span { opacity:.6; }
  .drop-hint.hidden { display:none; }
  .instructions { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:50; background:rgba(0,0,0,.75); padding:7px 14px; border-radius:7px; font-size:10px; color:#aaa; white-space:nowrap; backdrop-filter:blur(6px); }
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600; display:flex; align-items:center; justify-content:center; }
  .confirm-box { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:22px; width:340px; text-align:center; }
  .confirm-box p { margin-bottom:16px; font-size:13px; line-height:1.5; }
  .confirm-box .actions { display:flex; gap:8px; justify-content:center; }
  .field-hint { font-size:9px; color:#666; margin-top:2px; }
  .hb-pos-row { display:flex; gap:8px; align-items:flex-end; margin-top:8px; }
  .hb-pos-row .field { margin-bottom:0; flex:1; }
  .hb-pos-row .field input { width:100%; }
  .place-btn { padding:5px 10px; font-size:10px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text); transition:.15s; align-self:flex-end; white-space:nowrap; }
  .place-btn:hover { border-color:var(--accent); color:#fff; }
  .place-btn.placing { background:var(--danger); color:#fff; border-color:var(--danger); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.6} }
  .fixed-pin { z-index:80; pointer-events:none; }
</style>
</head>
<body>
<div class="topbar">
  <h1>Infographic Builder</h1>
  <div class="sep"></div>
  <label class="btn btn-ghost" style="cursor:pointer">Image<input type="file" id="imgInput" accept="image/*" hidden></label>
  <div class="shape-group">
    <button class="shape-btn active" data-shape="polygon">Poly</button>
    <button class="shape-btn" data-shape="rect">Rect</button>
    <button class="shape-btn" data-shape="oval">Oval</button>
  </div>
  <button class="btn btn-primary" id="addZoneBtn">+ New Zone</button>
  <button class="btn btn-ghost" id="toggleMode">Preview</button>
  <div class="sep"></div>
  <button class="btn btn-success" id="exportBtn">Export</button>
  <button class="btn btn-warn" id="saveFileBtn">Save .json</button>
  <label class="btn btn-ghost" style="cursor:pointer">Load .json<input type="file" id="loadFileInput" accept=".json" hidden></label>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="saveBtn" style="font-size:9px;padding:3px 8px">Autosave</button>
  <button class="btn btn-danger" id="resetBtn" style="font-size:9px;padding:3px 8px">Reset</button>
  <div class="save-status" id="saveStatus"><div class="save-dot unsaved"></div><span>Ready</span></div>
  <div class="mode-indicator mode-edit" id="modeLabel">Edit</div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr"><h2>Zones</h2><span id="selCount" style="font-size:10px;color:#888"></span></div>
    <div class="zone-actions" id="zoneActions"></div>
    <div class="zone-list" id="zoneList"></div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="drop-hint" id="dropHint">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span>Upload or drop an image to start</span>
    </div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div class="hoverbox" id="hoverbox"><div class="hb-title"></div><div class="hb-desc"></div></div>
    <div class="instructions" id="instructions" style="display:none"></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">Edit Zone</h2>
    <div class="field"><label>Title</label>
      <div class="tab-bar"><button class="tab-btn active" data-target="titleVisual">Visual</button><button class="tab-btn" data-target="titleCode">HTML</button><button class="tab-btn" data-target="titlePreview">Preview</button></div>
      <div id="titleVisual"><input id="mTitle" placeholder="Zone title"></div>
      <div id="titleCode" style="display:none"><textarea class="code-editor" id="mTitleHtml" placeholder="<h3 style='color:gold'>Title</h3>"></textarea><div class="field-hint">Overrides visual title when not empty.</div></div>
      <div id="titlePreview" style="display:none"><div class="preview-pane" id="titlePreviewPane"></div></div>
    </div>
    <div class="field"><label>Description</label>
      <div class="tab-bar"><button class="tab-btn active" data-target="descVisual">Visual</button><button class="tab-btn" data-target="descCode">HTML</button><button class="tab-btn" data-target="descPreview">Preview</button></div>
      <div id="descVisual"><textarea id="mDesc" placeholder="Description..."></textarea></div>
      <div id="descCode" style="display:none"><textarea class="code-editor" id="mDescHtml" placeholder="<p style='font-size:14px'>Rich <em>text</em></p>"></textarea><div class="field-hint">Overrides visual desc when not empty.</div></div>
      <div id="descPreview" style="display:none"><div class="preview-pane" id="descPreviewPane"></div></div>
    </div>
    <div class="field"><label>Zone Color</label>
      <div class="color-row"><input type="color" id="mColor" value="#6c5ce7"><input type="range" id="mOpacity" min="0" max="100" value="25" style="flex:1"><button class="no-color-btn" id="noColorBtn">No Color</button></div>
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Hoverbox BG</label><input type="color" id="mHbBg" value="#2a2a3d"></div>
      <div class="field" style="flex:1"><label>Hoverbox Text</label><input type="color" id="mHbText" value="#ffffff"></div>
    </div>
    <div class="field"><label>Border Radius (px)</label><input type="number" id="mHbRadius" value="10" min="0" max="40"></div>
    <div class="field">
      <label>Hoverbox Position</label>
      <select id="mHbMode">
        <option value="follow">Follow cursor</option>
        <option value="fixed">Fixed position</option>
      </select>
      <div class="hb-pos-row" id="fixedPosRow" style="display:none">
        <div class="field"><label>X (px)</label><input type="number" id="mHbX" value="0"></div>
        <div class="field"><label>Y (px)</label><input type="number" id="mHbY" value="0"></div>
        <button class="place-btn" id="placeBtn">Pick on canvas</button>
      </div>
      <div class="field-hint" id="fixedHint" style="display:none">Coordinates in image pixels. Use "Pick on canvas" to click-place.</div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSave">Save</button></div>
  </div>
</div>
<script>
const DRAG_BUF=14,EDGE_BUF=10,AUTOSAVE_MS=1500,OVAL_PTS=32;
const S={
  img:null,imgW:0,imgH:0,imgSrc:null,zones:[],mode:'edit',shapeTool:'polygon',
  drawing:false,currentPts:[],shapeStart:null,shapeEnd:null,shapeDragging:false,
  selectedZones:new Set(),hoveredZone:null,nextId:1,
  dragging:false,dragZoneId:null,dragPartIdx:-1,dragPtIdx:-1,dragStarted:false,
  moveDrag:false,moveZoneIds:[],moveStartImg:null,moveLastImg:null,moveMoved:false,
  // hoverbox placement mode
  placing:false,placingZoneId:null,
};
const $=s=>document.querySelector(s);
const bgC=$('#bgCanvas'),drawC=$('#drawCanvas');
const bgX=bgC.getContext('2d'),ctx=drawC.getContext('2d');

document.querySelectorAll('.shape-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.shape-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.shapeTool=b.dataset.shape;if(S.drawing)cancelDraw();});});
document.querySelectorAll('.tab-bar').forEach(bar=>{bar.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{const t=btn.dataset.target,p=bar.parentElement;bar.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');[...bar.querySelectorAll('.tab-btn')].forEach(b=>{const el=p.querySelector('#'+b.dataset.target);if(el)el.style.display=b.dataset.target===t?'':'none';});if(t==='titlePreview')$('#titlePreviewPane').innerHTML=$('#mTitleHtml').value.trim()||'<h3>'+esc($('#mTitle').value||'')+'</h3>';if(t==='descPreview')$('#descPreviewPane').innerHTML=$('#mDescHtml').value.trim()||'<p>'+esc($('#mDesc').value||'')+'</p>';});});});
let noColorActive=false;
$('#noColorBtn').addEventListener('click',()=>{noColorActive=!noColorActive;$('#noColorBtn').classList.toggle('active',noColorActive);$('#mColor').disabled=noColorActive;$('#mOpacity').disabled=noColorActive;});

// Hoverbox mode toggle
$('#mHbMode').addEventListener('change',e=>{
  const fixed=e.target.value==='fixed';
  $('#fixedPosRow').style.display=fixed?'flex':'none';
  $('#fixedHint').style.display=fixed?'':'none';
});
$('#placeBtn').addEventListener('click',()=>{
  if(!editZ)return;
  // minimize modal, enter placement mode
  $('#modalOverlay').style.display='none';
  S.placing=true;S.placingZoneId=editZ.id;
  updI();render();
});

/* === Helpers === */
function ensP(z){if(!z.parts){z.parts=z.points?[z.points]:[];delete z.points;}if(z.hbMode===undefined)z.hbMode='follow';if(z.hbX===undefined)z.hbX=0;if(z.hbY===undefined)z.hbY=0;return z;}
function zP(z){ensP(z);return z.parts;}
function hexA(a){const v=Math.round(Math.max(0,Math.min(1,a))*255).toString(16);return v.length<2?'0'+v:v;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function totPts(z){return zP(z).reduce((s,p)=>s+p.length,0);}
function cloneZone(z){return JSON.parse(JSON.stringify(z));}
function zoneCentroid(z){const pts=zP(z).flat();if(!pts.length)return[0,0];let sx=0,sy=0;pts.forEach(p=>{sx+=p[0];sy+=p[1];});return[Math.round(sx/pts.length),Math.round(sy/pts.length)];}

/* === Save === */
let autoT=null,saveGen=0;
function setSS(s,t){const e=$('#saveStatus');e.querySelector('.save-dot').className='save-dot '+s;e.querySelector('span').textContent=t;}
function markDirty(){setSS('unsaved','Unsaved');clearTimeout(autoT);autoT=setTimeout(()=>savePrj(),AUTOSAVE_MS);}
async function savePrj(){const g=++saveGen;setSS('saving','Saving...');try{await window.storage.set('ig-zones',JSON.stringify({zones:S.zones,nextId:S.nextId,imgW:S.imgW,imgH:S.imgH}));if(S.imgSrc)await window.storage.set('ig-img',S.imgSrc);if(g===saveGen)setSS('saved','Saved');}catch(e){if(g===saveGen)setSS('unsaved','Failed');}}
async function loadPrj(){try{const r=await window.storage.get('ig-zones');if(!r){setSS('unsaved','No data');return;}const d=JSON.parse(r.value);S.zones=(d.zones||[]).map(z=>{ensP(z);return z;});S.nextId=d.nextId||1;S.imgW=d.imgW||0;S.imgH=d.imgH||0;try{const ir=await window.storage.get('ig-img');if(ir&&ir.value){const img=new Image();await new Promise((r,j)=>{img.onload=r;img.onerror=j;img.src=ir.value;});S.img=img;S.imgSrc=ir.value;S.imgW=img.width;S.imgH=img.height;$('#dropHint').classList.add('hidden');}}catch(e){}renderList();resize();setSS('saved','Loaded');}catch(e){setSS('unsaved','No data');}}
async function resetPrj(){try{await window.storage.delete('ig-zones');}catch(e){}try{await window.storage.delete('ig-img');}catch(e){}S.img=null;S.imgSrc=null;S.imgW=0;S.imgH=0;S.zones=[];S.nextId=1;S.selectedZones.clear();S.drawing=false;S.currentPts=[];S.shapeDragging=false;S.placing=false;$('#dropHint').classList.remove('hidden');renderList();updI();resize();setSS('unsaved','Reset');}
$('#saveBtn').addEventListener('click',()=>{clearTimeout(autoT);savePrj();});
$('#resetBtn').addEventListener('click',()=>{const o=document.createElement('div');o.className='confirm-overlay';o.innerHTML='<div class="confirm-box"><p>Delete everything?</p><div class="actions"><button class="btn btn-ghost" id="cN">Cancel</button><button class="btn btn-danger" id="cY">Reset</button></div></div>';document.body.appendChild(o);o.querySelector('#cN').addEventListener('click',()=>o.remove());o.querySelector('#cY').addEventListener('click',()=>{o.remove();resetPrj();});o.addEventListener('click',e=>{if(e.target===o)o.remove();});});

/* === File IO === */
$('#saveFileBtn').addEventListener('click',()=>{const d={version:3,imgSrc:S.imgSrc,imgW:S.imgW,imgH:S.imgH,zones:S.zones,nextId:S.nextId};const b=new Blob([JSON.stringify(d)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='infographic-project.json';a.click();});
$('#loadFileInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);S.zones=(d.zones||[]).map(z=>{ensP(z);return z;});S.nextId=d.nextId||1;if(d.imgSrc){const img=new Image();img.onload=()=>{S.img=img;S.imgSrc=d.imgSrc;S.imgW=img.width;S.imgH=img.height;$('#dropHint').classList.add('hidden');renderList();resize();markDirty();};img.onerror=()=>{renderList();resize();markDirty();};img.src=d.imgSrc;}else{S.img=null;S.imgSrc=null;renderList();resize();markDirty();}}catch(err){alert('Invalid file.');}};r.readAsText(f);e.target.value='';});

/* === Resize/Image === */
function resize(){const w=$('#canvasWrap');bgC.width=drawC.width=w.clientWidth;bgC.height=drawC.height=w.clientHeight;render();}
window.addEventListener('resize',resize);
function loadImg(f){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{S.img=img;S.imgW=img.width;S.imgH=img.height;S.imgSrc=e.target.result;$('#dropHint').classList.add('hidden');resize();markDirty();};img.src=e.target.result;};r.readAsDataURL(f);}
$('#imgInput').addEventListener('change',e=>{if(e.target.files[0])loadImg(e.target.files[0]);});
$('#canvasWrap').addEventListener('dragover',e=>e.preventDefault());
$('#canvasWrap').addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadImg(f);});

/* === Coords === */
function getScale(){if(!S.img)return{s:1,ox:0,oy:0};const w=drawC.width,h=drawC.height,sc=Math.min(w/S.imgW,h/S.imgH);return{s:sc,ox:(w-S.imgW*sc)/2,oy:(h-S.imgH*sc)/2};}
function toC(px,py){const{s,ox,oy}=getScale();return[px*s+ox,py*s+oy];}
function toI(cx,cy){const{s,ox,oy}=getScale();return[(cx-ox)/s,(cy-oy)/s];}

function findPt(cx,cy){let best=null,bd=1e9;const pri=[...S.selectedZones];const order=[...S.zones.filter(z=>pri.includes(z.id)),...S.zones.filter(z=>!pri.includes(z.id))];for(const z of order)for(let pi=0;pi<zP(z).length;pi++)for(let i=0;i<z.parts[pi].length;i++){const[px,py]=toC(...z.parts[pi][i]);const d=Math.hypot(cx-px,cy-py);if(d<DRAG_BUF&&d<bd){bd=d;best={zid:z.id,pi,i};}}return best;}
function findEdge(cx,cy){if(S.selectedZones.size!==1)return null;const z=S.zones.find(zz=>zz.id===[...S.selectedZones][0]);if(!z)return null;let best=null,bd=1e9;for(let pi=0;pi<zP(z).length;pi++){const pts=z.parts[pi];for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;const[ax,ay]=toC(...pts[i]),[bx,by]=toC(...pts[j]);const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(!l2)continue;let t=((cx-ax)*dx+(cy-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));const px2=ax+t*dx,py2=ay+t*dy,d=Math.hypot(cx-px2,cy-py2);if(d<EDGE_BUF&&d<bd){bd=d;const ip=toI(px2,py2);best={pi,ei:i,pt:[Math.round(ip[0]),Math.round(ip[1])]};}}}return best;}
function ptInPoly(x,y,pts){let ins=false;for(let i=0,j=pts.length-1;i<pts.length;j=i++){const[xi,yi]=pts[i],[xj,yj]=pts[j];if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))ins=!ins;}return ins;}
function ptInZone(x,y,z){return zP(z).some(p=>ptInPoly(x,y,p));}
function hitZone(cx,cy){const[ix,iy]=toI(cx,cy);return[...S.zones].reverse().find(z=>ptInZone(ix,iy,z))||null;}
function makeRect(a,b){const x1=Math.min(a[0],b[0]),y1=Math.min(a[1],b[1]),x2=Math.max(a[0],b[0]),y2=Math.max(a[1],b[1]);return[[x1,y1],[x2,y1],[x2,y2],[x1,y2]].map(p=>[Math.round(p[0]),Math.round(p[1])]);}
function makeOval(a,b){const cx2=(a[0]+b[0])/2,cy2=(a[1]+b[1])/2,rx=Math.abs(b[0]-a[0])/2,ry=Math.abs(b[1]-a[1])/2;const pts=[];for(let i=0;i<OVAL_PTS;i++){const ang=2*Math.PI*i/OVAL_PTS;pts.push([Math.round(cx2+rx*Math.cos(ang)),Math.round(cy2+ry*Math.sin(ang))]);}return pts;}
function moveZonesBy(ids,dx,dy){ids.forEach(id=>{const z=S.zones.find(zz=>zz.id===id);if(!z)return;zP(z).forEach(pts=>{for(let i=0;i<pts.length;i++)pts[i]=[Math.round(pts[i][0]+dx),Math.round(pts[i][1]+dy)];});if(z.hbMode==='fixed'){z.hbX=Math.round(z.hbX+dx);z.hbY=Math.round(z.hbY+dy);}});}
function duplicateSelected(){const ids=[...S.selectedZones];if(!ids.length)return;const nids=[];ids.forEach(id=>{const z=S.zones.find(zz=>zz.id===id);if(!z)return;const nz=cloneZone(z);nz.id=S.nextId++;nz.title=z.title+' copy';zP(nz).forEach(pts=>{for(let i=0;i<pts.length;i++)pts[i]=[pts[i][0]+20,pts[i][1]+20];});if(nz.hbMode==='fixed'){nz.hbX+=20;nz.hbY+=20;}S.zones.push(nz);nids.push(nz.id);});S.selectedZones.clear();nids.forEach(id=>S.selectedZones.add(id));renderList();render();markDirty();}

/* === Render === */
function render(){
  const w=bgC.width,h=bgC.height;bgX.clearRect(0,0,w,h);ctx.clearRect(0,0,w,h);
  if(S.img){const{s,ox,oy}=getScale();bgX.drawImage(S.img,ox,oy,S.imgW*s,S.imgH*s);}
  S.zones.forEach(z=>{
    const sel=S.selectedZones.has(z.id),hov=S.mode==='preview'&&S.hoveredZone===z.id,nc=z.noColor;
    zP(z).forEach(pts=>{
      if(pts.length<2)return;
      ctx.beginPath();ctx.moveTo(...toC(...pts[0]));for(let i=1;i<pts.length;i++)ctx.lineTo(...toC(...pts[i]));ctx.closePath();
      if(nc&&!hov){if(S.mode==='edit'){ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.25)';ctx.lineWidth=sel?2:1;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);}}
      else{const op=(z.opacity||25)/100;ctx.fillStyle=z.color+hexA(hov?Math.min(op+.25,1):op);ctx.fill();ctx.strokeStyle=sel?'#fff':z.color;ctx.lineWidth=sel?2.5:1.5;ctx.stroke();}
      if(S.mode==='edit'){pts.forEach((p,i)=>{
        const[cx2,cy2]=toC(...p);const isD=S.dragging&&S.dragZoneId===z.id&&S.dragPtIdx===i;
        const rad=isD?7:(sel?5:3);
        if(sel){ctx.beginPath();ctx.arc(cx2,cy2,DRAG_BUF,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fill();}
        ctx.beginPath();ctx.arc(cx2,cy2,rad,0,Math.PI*2);ctx.fillStyle=isD?'#fff':(nc?'#aaa':z.color);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      });}
    });
    // Draw fixed hoverbox pin in edit mode
    if(S.mode==='edit'&&z.hbMode==='fixed'&&sel){
      const[cx2,cy2]=toC(z.hbX,z.hbY);
      ctx.save();
      // pin icon: circle + line
      ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2,cy2-18);ctx.strokeStyle='#f39c12';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(cx2,cy2-18,6,0,Math.PI*2);ctx.fillStyle='#f39c12';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(cx2,cy2-18,2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
      // label
      ctx.font='bold 9px sans-serif';ctx.fillStyle='#f39c12';ctx.textAlign='center';ctx.fillText('HOVERBOX',cx2,cy2+10);
      ctx.restore();
    }
  });
  // placing mode crosshair
  if(S.placing){
    ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='#f39c12';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,S._placeY||0);ctx.lineTo(w,S._placeY||0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(S._placeX||0,0);ctx.lineTo(S._placeX||0,h);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
  // drawing preview
  if(S.drawing){
    if(S.shapeTool==='polygon'&&S.currentPts.length){ctx.beginPath();ctx.moveTo(...toC(...S.currentPts[0]));for(let i=1;i<S.currentPts.length;i++)ctx.lineTo(...toC(...S.currentPts[i]));ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);S.currentPts.forEach(p=>{const[cx2,cy2]=toC(...p);ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.fillStyle='#6c5ce7';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();});}
    if((S.shapeTool==='rect'||S.shapeTool==='oval')&&S.shapeStart&&S.shapeEnd){const pts=S.shapeTool==='rect'?makeRect(S.shapeStart,S.shapeEnd):makeOval(S.shapeStart,S.shapeEnd);if(pts.length>1){ctx.beginPath();ctx.moveTo(...toC(...pts[0]));for(let i=1;i<pts.length;i++)ctx.lineTo(...toC(...pts[i]));ctx.closePath();ctx.fillStyle='rgba(108,92,231,0.2)';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);}}
  }
  // preview fixed hoverboxes
  if(S.mode==='preview'&&S.hoveredZone!=null){
    const z=S.zones.find(zz=>zz.id===S.hoveredZone);
    if(z&&z.hbMode==='fixed'){
      const[cx2,cy2]=toC(z.hbX,z.hbY);
      const hb=$('#hoverbox');
      hb.style.left=cx2+'px';hb.style.top=cy2+'px';
    }
  }
}

function updI(){
  const el=$('#instructions');
  if(S.placing){el.style.display='';el.textContent='Click anywhere to place the hoverbox position \u2022 Esc to cancel';return;}
  if(S.drawing){el.style.display='';el.textContent=S.shapeTool==='polygon'?'Click to place points \u2022 Dbl-click/Enter close \u2022 Right-click undo \u2022 Esc cancel':'Click+drag to draw '+S.shapeTool+' \u2022 Esc cancel';}
  else if(S.mode==='edit'&&S.selectedZones.size>=1){el.style.display='';el.textContent='Drag zone to move \u2022 Drag points to reshape \u2022 Dbl-click edge +point \u2022 Right-click point -point \u2022 Shift multi-select \u2022 Ctrl+D dup';}
  else if(S.mode==='edit'){el.style.display='';el.textContent='Click zone to select \u2022 Shift+click multi-select';}
  else el.style.display='none';
}

/* === Drawing === */
function startDraw(){if(!S.img)return alert('Upload image first.');S.drawing=true;S.currentPts=[];S.shapeStart=null;S.shapeEnd=null;S.shapeDragging=false;updI();render();}
function finishPoly(){if(S.currentPts.length<3){cancelDraw();return;}S.drawing=false;createZone([S.currentPts.slice()]);}
function finishShape(pts){S.drawing=false;S.shapeDragging=false;createZone([pts]);}
function createZone(parts){const c=zoneCentroidFromParts(parts);const z={id:S.nextId++,title:'Zone '+S.zones.length,desc:'Description...',titleHtml:'',descHtml:'',parts,color:'#6c5ce7',opacity:25,noColor:false,hbBg:'#2a2a3d',hbText:'#ffffff',hbRadius:10,hbMode:'follow',hbX:c[0],hbY:c[1]-30};S.zones.push(z);S.currentPts=[];S.selectedZones.clear();S.selectedZones.add(z.id);renderList();updI();render();markDirty();openModal(z);}
function zoneCentroidFromParts(parts){const pts=parts.flat();if(!pts.length)return[0,0];let sx=0,sy=0;pts.forEach(p=>{sx+=p[0];sy+=p[1];});return[Math.round(sx/pts.length),Math.round(sy/pts.length)];}
function cancelDraw(){S.drawing=false;S.currentPts=[];S.shapeDragging=false;S.shapeStart=null;S.shapeEnd=null;updI();render();}
$('#addZoneBtn').addEventListener('click',()=>{if(S.mode==='edit'&&!S.placing)startDraw();});

function mergeZones(){const ids=[...S.selectedZones];if(ids.length<2)return;const zs=ids.map(id=>S.zones.find(z=>z.id===id)).filter(Boolean);const base=cloneZone(zs[0]);const np=[];zs.forEach(z=>zP(z).forEach(p=>np.push(p.slice())));base.parts=np;base.id=S.nextId++;S.zones=S.zones.filter(z=>!ids.includes(z.id));S.zones.push(base);S.selectedZones.clear();S.selectedZones.add(base.id);renderList();render();markDirty();}
function disconnectZone(){if(S.selectedZones.size!==1)return;const z=S.zones.find(zz=>zz.id===[...S.selectedZones][0]);if(!z||zP(z).length<2)return;const nz=zP(z).map((pts,i)=>{const c=cloneZone(z);c.id=S.nextId++;c.title=z.title+(i?' ('+(i+1)+')':'');c.parts=[pts.slice()];return c;});S.zones=S.zones.filter(zz=>zz.id!==z.id).concat(nz);S.selectedZones.clear();nz.forEach(n=>S.selectedZones.add(n.id));renderList();render();markDirty();}

/* === Mouse === */
drawC.addEventListener('mousedown',e=>{
  if(S.mode!=='edit'||e.button!==0)return;
  if(S.placing)return; // handled in click
  if(S.drawing&&S.shapeTool!=='polygon'){const pt=toI(e.offsetX,e.offsetY);S.shapeStart=[Math.round(pt[0]),Math.round(pt[1])];S.shapeEnd=[...S.shapeStart];S.shapeDragging=true;e.preventDefault();return;}
  if(S.drawing)return;
  const hit=findPt(e.offsetX,e.offsetY);
  if(hit){S.dragging=true;S.dragZoneId=hit.zid;S.dragPartIdx=hit.pi;S.dragPtIdx=hit.i;S.dragStarted=false;if(!e.shiftKey)S.selectedZones.clear();S.selectedZones.add(hit.zid);renderList();render();e.preventDefault();return;}
  const hz=hitZone(e.offsetX,e.offsetY);
  if(hz){if(!S.selectedZones.has(hz.id)){if(!e.shiftKey)S.selectedZones.clear();S.selectedZones.add(hz.id);renderList();render();}const ip=toI(e.offsetX,e.offsetY);S.moveDrag=true;S.moveZoneIds=[...S.selectedZones];S.moveStartImg=[ip[0],ip[1]];S.moveLastImg=[ip[0],ip[1]];S.moveMoved=false;e.preventDefault();}
});
drawC.addEventListener('mousemove',e=>{
  if(S.placing){S._placeX=e.offsetX;S._placeY=e.offsetY;render();return;}
  if(S.drawing&&S.shapeDragging){const pt=toI(e.offsetX,e.offsetY);S.shapeEnd=[Math.round(pt[0]),Math.round(pt[1])];render();return;}
  if(S.mode==='edit'&&S.dragging){S.dragStarted=true;const z=S.zones.find(zz=>zz.id===S.dragZoneId);if(z){const pt=toI(e.offsetX,e.offsetY);z.parts[S.dragPartIdx][S.dragPtIdx]=[Math.round(pt[0]),Math.round(pt[1])];render();}return;}
  if(S.mode==='edit'&&S.moveDrag){const ip=toI(e.offsetX,e.offsetY);const dx=ip[0]-S.moveLastImg[0],dy=ip[1]-S.moveLastImg[1];if(Math.abs(ip[0]-S.moveStartImg[0])>2||Math.abs(ip[1]-S.moveStartImg[1])>2)S.moveMoved=true;moveZonesBy(S.moveZoneIds,dx,dy);S.moveLastImg=[ip[0],ip[1]];render();return;}
  if(S.mode==='edit'&&!S.drawing){const pt=findPt(e.offsetX,e.offsetY);if(pt){drawC.style.cursor='grab';return;}const hz=hitZone(e.offsetX,e.offsetY);if(hz&&S.selectedZones.has(hz.id)){drawC.style.cursor='move';return;}const eg=findEdge(e.offsetX,e.offsetY);drawC.style.cursor=eg?'cell':'default';}
  if(S.mode==='preview'){
    const[ix,iy]=toI(e.offsetX,e.offsetY);const hit=[...S.zones].reverse().find(z=>ptInZone(ix,iy,z));
    S.hoveredZone=hit?hit.id:null;const hb=$('#hoverbox');
    if(hit){const tH=hit.titleHtml&&hit.titleHtml.trim(),dH=hit.descHtml&&hit.descHtml.trim();
      hb.querySelector('.hb-title').innerHTML=tH||'<h3 style="margin:0;font-size:15px">'+esc(hit.title)+'</h3>';
      hb.querySelector('.hb-desc').innerHTML=dH||'<p style="margin:0">'+esc(hit.desc)+'</p>';
      hb.style.background=hit.hbBg;hb.style.color=hit.hbText;hb.style.borderRadius=hit.hbRadius+'px';
      if(hit.hbMode==='fixed'){const[fx,fy]=toC(hit.hbX,hit.hbY);hb.style.left=fx+'px';hb.style.top=fy+'px';}
      else{let l=e.offsetX+16,t=e.offsetY+16;const wr=$('#canvasWrap').getBoundingClientRect();if(l+320>wr.width)l=e.offsetX-280;if(t+150>wr.height)t=e.offsetY-120;hb.style.left=l+'px';hb.style.top=t+'px';}
      hb.classList.add('visible');
    }else hb.classList.remove('visible');render();
  }
});
drawC.addEventListener('mouseup',e=>{
  if(S.drawing&&S.shapeDragging){S.shapeDragging=false;const dx=Math.abs(S.shapeEnd[0]-S.shapeStart[0]),dy=Math.abs(S.shapeEnd[1]-S.shapeStart[1]);if(dx<5&&dy<5){S.shapeStart=null;S.shapeEnd=null;render();return;}finishShape(S.shapeTool==='rect'?makeRect(S.shapeStart,S.shapeEnd):makeOval(S.shapeStart,S.shapeEnd));return;}
  if(S.dragging){const was=S.dragStarted;S.dragging=false;S.dragZoneId=null;S.dragPartIdx=-1;S.dragPtIdx=-1;S.dragStarted=false;render();if(was)markDirty();return;}
  if(S.moveDrag){const moved=S.moveMoved;S.moveDrag=false;S.moveZoneIds=[];S.moveStartImg=null;S.moveLastImg=null;S.moveMoved=false;render();if(moved)markDirty();return;}
});
drawC.addEventListener('click',e=>{
  if(S.mode!=='edit')return;
  // placement mode
  if(S.placing){const[ix,iy]=toI(e.offsetX,e.offsetY);const z=S.zones.find(zz=>zz.id===S.placingZoneId);if(z){z.hbX=Math.round(ix);z.hbY=Math.round(iy);}S.placing=false;S.placingZoneId=null;render();markDirty();// reopen modal
    if(z){$('#mHbX').value=z.hbX;$('#mHbY').value=z.hbY;$('#modalOverlay').style.display='flex';}updI();return;}
  if(S.dragging||S.moveDrag)return;
  const near=findPt(e.offsetX,e.offsetY);
  if(S.drawing&&S.shapeTool==='polygon'){if(near)return;const pt=toI(e.offsetX,e.offsetY);S.currentPts.push([Math.round(pt[0]),Math.round(pt[1])]);render();return;}
  if(S.drawing)return;
  if(near)return;
  const hz=hitZone(e.offsetX,e.offsetY);
  if(e.shiftKey){if(hz){if(S.selectedZones.has(hz.id))S.selectedZones.delete(hz.id);else S.selectedZones.add(hz.id);}}
  else{S.selectedZones.clear();if(hz)S.selectedZones.add(hz.id);}
  renderList();updI();render();
});
drawC.addEventListener('dblclick',e=>{if(S.drawing&&S.shapeTool==='polygon'){finishPoly();return;}if(S.mode!=='edit'||S.drawing||S.placing)return;const edge=findEdge(e.offsetX,e.offsetY);if(edge){const z=S.zones.find(zz=>zz.id===[...S.selectedZones][0]);if(z){z.parts[edge.pi].splice(edge.ei+1,0,edge.pt);render();markDirty();}}});
drawC.addEventListener('contextmenu',e=>{e.preventDefault();if(S.drawing&&S.shapeTool==='polygon'&&S.currentPts.length){S.currentPts.pop();render();return;}if(S.mode!=='edit'||S.drawing||S.placing)return;const hit=findPt(e.offsetX,e.offsetY);if(hit){const z=S.zones.find(zz=>zz.id===hit.zid);if(z&&z.parts[hit.pi].length>3){z.parts[hit.pi].splice(hit.i,1);render();markDirty();}}});
drawC.addEventListener('mouseleave',()=>{if(S.dragging){S.dragging=false;S.dragZoneId=null;S.dragPartIdx=-1;S.dragPtIdx=-1;S.dragStarted=false;render();markDirty();}if(S.moveDrag){S.moveDrag=false;S.moveZoneIds=[];render();markDirty();}if(S.shapeDragging&&S.drawing){S.shapeDragging=false;S.shapeStart=null;S.shapeEnd=null;render();}S.hoveredZone=null;$('#hoverbox').classList.remove('visible');if(S.mode==='preview')render();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(S.placing){S.placing=false;S.placingZoneId=null;const z=editZ;if(z){$('#modalOverlay').style.display='flex';}updI();render();return;}if(S.drawing)cancelDraw();}
  if(e.key==='Enter'&&S.drawing&&S.shapeTool==='polygon')finishPoly();
  if(e.key==='Delete'&&S.mode==='edit'&&S.selectedZones.size&&!S.drawing&&!S.placing){S.zones=S.zones.filter(z=>!S.selectedZones.has(z.id));S.selectedZones.clear();renderList();updI();render();markDirty();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'&&S.mode==='edit'&&S.selectedZones.size){e.preventDefault();duplicateSelected();}
});

/* === Mode === */
$('#toggleMode').addEventListener('click',()=>{if(S.drawing)cancelDraw();if(S.placing){S.placing=false;S.placingZoneId=null;}S.mode=S.mode==='edit'?'preview':'edit';const ml=$('#modeLabel');if(S.mode==='preview'){ml.textContent='Preview';ml.className='mode-indicator mode-preview';$('#toggleMode').textContent='Edit';$('#sidebar').classList.add('hidden');$('#canvasWrap').classList.add('preview');}else{ml.textContent='Edit';ml.className='mode-indicator mode-edit';$('#toggleMode').textContent='Preview';$('#sidebar').classList.remove('hidden');$('#canvasWrap').classList.remove('preview');}S.hoveredZone=null;$('#hoverbox').classList.remove('visible');updI();resize();});

/* === Zone List === */
function renderList(){
  const list=$('#zoneList'),acts=$('#zoneActions'),cnt=$('#selCount');
  const ss=S.selectedZones.size;cnt.textContent=ss>1?ss+' selected':'';
  acts.innerHTML='';
  if(ss>=1){const b=document.createElement('button');b.className='btn btn-cyan';b.textContent='Duplicate'+(ss>1?' ('+ss+')':'');b.addEventListener('click',duplicateSelected);acts.appendChild(b);}
  if(ss>=2){const b=document.createElement('button');b.className='btn btn-primary';b.textContent='Merge ('+ss+')';b.addEventListener('click',mergeZones);acts.appendChild(b);}
  if(ss===1){const z=S.zones.find(zz=>zz.id===[...S.selectedZones][0]);if(z&&zP(z).length>1){const b=document.createElement('button');b.className='btn btn-warn';b.textContent='Disconnect ('+zP(z).length+')';b.addEventListener('click',disconnectZone);acts.appendChild(b);}}
  list.innerHTML='';
  S.zones.forEach(z=>{
    const sel=S.selectedZones.has(z.id),multi=S.selectedZones.size>1&&sel;
    const div=document.createElement('div');
    div.className='zone-item'+(sel&&!multi?' active':'')+(multi?' multi-selected':'');
    const cc=z.noColor?'zi-color no-color':'zi-color',cs=z.noColor?'':`background:${z.color}`;
    const np=zP(z).length,pl=np>1?' \u2022 '+np+' parts':'';
    const posLabel=z.hbMode==='fixed'?' \u2022 pinned':'';
    div.innerHTML=`<div class="zi-head"><div><div class="zi-title">${esc(z.title)}</div><div class="zi-info">${totPts(z)} pts${pl}${z.noColor?' \u2022 invisible':''}${posLabel}</div></div><div class="${cc}" style="${cs}"></div></div><div class="zi-actions"><button class="zi-btn edit-btn">Edit</button><button class="zi-btn dup-btn">Dup</button><button class="zi-btn del">Delete</button></div>`;
    div.addEventListener('click',e=>{if(e.target.closest('.zi-btn'))return;if(e.shiftKey){if(S.selectedZones.has(z.id))S.selectedZones.delete(z.id);else S.selectedZones.add(z.id);}else{S.selectedZones.clear();S.selectedZones.add(z.id);}renderList();updI();render();});
    div.querySelector('.edit-btn').addEventListener('click',()=>openModal(z));
    div.querySelector('.dup-btn').addEventListener('click',()=>{S.selectedZones.clear();S.selectedZones.add(z.id);duplicateSelected();});
    div.querySelector('.del').addEventListener('click',()=>{S.zones=S.zones.filter(zz=>zz.id!==z.id);S.selectedZones.delete(z.id);renderList();updI();render();markDirty();});
    list.appendChild(div);
  });
}

/* === Modal === */
let editZ=null;
function openModal(z){
  editZ=z;$('#mTitle').value=z.title;$('#mDesc').value=z.desc;$('#mTitleHtml').value=z.titleHtml||'';$('#mDescHtml').value=z.descHtml||'';
  $('#mColor').value=z.color;$('#mOpacity').value=z.opacity;$('#mHbBg').value=z.hbBg;$('#mHbText').value=z.hbText;$('#mHbRadius').value=z.hbRadius;
  noColorActive=!!z.noColor;$('#noColorBtn').classList.toggle('active',noColorActive);$('#mColor').disabled=noColorActive;$('#mOpacity').disabled=noColorActive;
  $('#mHbMode').value=z.hbMode||'follow';
  const fixed=z.hbMode==='fixed';
  $('#fixedPosRow').style.display=fixed?'flex':'none';$('#fixedHint').style.display=fixed?'':'none';
  $('#mHbX').value=z.hbX||0;$('#mHbY').value=z.hbY||0;
  $('#modalTitle').textContent='Edit: '+z.title;
  document.querySelectorAll('.tab-bar').forEach(bar=>{const btns=bar.querySelectorAll('.tab-btn');btns.forEach((b,i)=>{b.classList.toggle('active',i===0);const t=bar.parentElement.querySelector('#'+b.dataset.target);if(t)t.style.display=i===0?'':'none';});});
  $('#modalOverlay').style.display='flex';
}
function closeModal(){$('#modalOverlay').style.display='none';editZ=null;}
$('#modalCancel').addEventListener('click',closeModal);
$('#modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
$('#modalSave').addEventListener('click',()=>{if(!editZ)return;editZ.title=$('#mTitle').value||'Untitled';editZ.desc=$('#mDesc').value;editZ.titleHtml=$('#mTitleHtml').value;editZ.descHtml=$('#mDescHtml').value;editZ.color=$('#mColor').value;editZ.opacity=parseInt($('#mOpacity').value);editZ.noColor=noColorActive;editZ.hbBg=$('#mHbBg').value;editZ.hbText=$('#mHbText').value;editZ.hbRadius=parseInt($('#mHbRadius').value);editZ.hbMode=$('#mHbMode').value;editZ.hbX=parseInt($('#mHbX').value)||0;editZ.hbY=parseInt($('#mHbY').value)||0;closeModal();renderList();render();markDirty();});

/* === Export === */
$('#exportBtn').addEventListener('click',()=>{
  if(!S.img||!S.zones.length)return alert('Need image + zones.');
  const zones=S.zones.map(z=>({title:z.title,desc:z.desc,titleHtml:z.titleHtml||'',descHtml:z.descHtml||'',parts:zP(z),color:z.color,opacity:z.opacity,noColor:!!z.noColor,hbBg:z.hbBg,hbText:z.hbText,hbRadius:z.hbRadius,hbMode:z.hbMode||'follow',hbX:z.hbX||0,hbY:z.hbY||0}));
  let polys='';zones.forEach((z,i)=>{const hf=z.noColor?'transparent':z.color+hexA((z.opacity||25)/100);const cls=z.noColor?'zone nh':'zone';z.parts.forEach(pts=>{polys+=`<polygon class="${cls}" data-i="${i}" points="${pts.map(p=>p.join(',')).join(' ')}" style="--hc:${hf}"/>\n`;});});
  const html=`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interactive Infographic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{position:relative;display:inline-block;line-height:0}.wrap img{max-width:100vw;max-height:100vh}
svg{position:absolute;top:0;left:0;width:100%;height:100%}
.zone{cursor:pointer;fill:transparent;stroke:transparent;stroke-width:0;transition:fill .25s,stroke .25s}
.zone:hover{fill:var(--hc);stroke:var(--hc);stroke-width:1.5}.zone.nh:hover{fill:transparent;stroke:transparent}
.hb{position:absolute;padding:14px 18px;max-width:320px;min-width:160px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;transform:translateY(6px);box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:10}
.hb.show{opacity:1;transform:translateY(0)}
</style></head><body>
<div class="wrap" id="wrap"><img src="${S.imgSrc}" id="bgImg">
<svg id="svgEl" viewBox="0 0 ${S.imgW} ${S.imgH}" preserveAspectRatio="xMidYMid meet">${polys}</svg>
<div class="hb" id="hb"><div class="hbt"></div><div class="hbd"></div></div></div>
<script>
const Z=${JSON.stringify(zones)};const hb=document.getElementById('hb');const wrap=document.getElementById('wrap');
function e(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function imgToWrap(ix,iy){const img=document.getElementById('bgImg');const r=img.getBoundingClientRect();const wr=wrap.getBoundingClientRect();const s=img.naturalWidth?r.width/img.naturalWidth:1;return{x:ix*s+(r.left-wr.left),y:iy*s+(r.top-wr.top)};}
document.querySelectorAll('.zone').forEach(el=>{
el.addEventListener('mouseenter',ev=>{const z=Z[el.dataset.i];
hb.querySelector('.hbt').innerHTML=z.titleHtml&&z.titleHtml.trim()?z.titleHtml:'<h3 style="margin:0 0 6px;font-size:15px">'+e(z.title)+'</h3>';
hb.querySelector('.hbd').innerHTML=z.descHtml&&z.descHtml.trim()?z.descHtml:'<p style="margin:0;font-size:13px;line-height:1.5;opacity:.9">'+e(z.desc)+'</p>';
hb.style.background=z.hbBg;hb.style.color=z.hbText;hb.style.borderRadius=z.hbRadius+'px';
if(z.hbMode==='fixed'){const p=imgToWrap(z.hbX,z.hbY);hb.style.left=p.x+'px';hb.style.top=p.y+'px';}
hb.classList.add('show')});
el.addEventListener('mousemove',ev=>{const z=Z[el.dataset.i];if(z.hbMode==='fixed')return;const r=wrap.getBoundingClientRect();let l=ev.clientX-r.left+16,t=ev.clientY-r.top+16;if(l+320>r.width)l=ev.clientX-r.left-280;if(t+150>r.height)t=ev.clientY-r.top-120;hb.style.left=l+'px';hb.style.top=t+'px'});
el.addEventListener('mouseleave',()=>{hb.classList.remove('show')})});
<\/script></body></html>`;
  const b=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='infographic.html';a.click();
});

resize();loadPrj();
</script>
</body>
